name: PR Issue Check

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  check-issue-linked:
    name: Check Issue Linked
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if PR is linked to an issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request?.number || 'manual-run';
            let prBody = context.payload.pull_request?.body || '';
            const prTitle = context.payload.pull_request?.title || '';

            if (!context.payload.pull_request) {
              core.info('ℹ️ workflow_dispatch run detected: PR-only checks skipped.');
              return;
            }
            
            const conventionalCommitsPattern = /^(feat|fix|docs|style|refactor|perf|test|chore|ci|build)(\(.+\))?: .+$/;
            const validTypes = ['feat', 'fix', 'docs', 'style', 'refactor', 'perf', 'test', 'chore', 'ci', 'build'];
            
            if (!conventionalCommitsPattern.test(prTitle)) {
              const errorMessage = 
                '❌ PR title does not follow Conventional Commits format.\n\n' +
                'Required format: <type>(<scope>): <description>\n\n' +
                'Valid types:\n' +
                validTypes.map(t => `  - ${t}`).join('\n') + '\n\n' +
                'Examples:\n' +
                '  ✅ feat: add user authentication\n' +
                '  ✅ fix(web): resolve login button issue\n' +
                '  ✅ docs: update API documentation\n' +
                '  ✅ refactor(backend): improve error handling\n' +
                '  ✅ chore: update dependencies\n\n' +
                'Common mistakes:\n' +
                '  ❌ "Add new feature" (missing type and colon)\n' +
                '  ❌ "feat add feature" (missing colon)\n' +
                '  ❌ "feat: " (missing description)\n' +
                '  ❌ "feature: add something" (invalid type)\n\n' +
                `Current title: "${prTitle}"\n\n` +
                'Please update your PR title to follow the Conventional Commits specification.';
              
              core.setFailed(errorMessage);
              return;
            }

            // Accept references like:
            // - #123
            // - fixes #123 / closes #123 / resolves #123
            // - full URL to GitHub issue
            const issueRefPatterns = [
              /(?:^|\s)#\d+\b/i,
              /\b(?:fix(?:e[sd])?|close[sd]?|resolve[sd]?)\s+#\d+\b/i,
              /https:\/\/github\.com\/[^/\s]+\/[^/\s]+\/issues\/\d+\b/i,
            ];

            const hasIssueRef = issueRefPatterns.some(pattern => pattern.test(prBody) || pattern.test(prTitle));

            if (!hasIssueRef) {
              const message = (
                `❌ PR #${prNumber} is not linked to any issue.\n\n` +
                'Please add one issue reference in PR title or body.\n' +
                'Examples:\n' +
                '- "fix(server): handle queue logger init (#123)"\n' +
                '- "Closes #123"\n' +
                '- "Fixes https://github.com/<org>/<repo>/issues/123"'
              );

              core.setFailed(message);
              return;
            }

            core.info(`✅ PR #${prNumber} passed title and issue-link checks.`);
