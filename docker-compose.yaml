services:
  mongodb:
    image: mongo:latest
    container_name: aitoearn-mongodb
    restart: unless-stopped
    entrypoint: [ "bash", "-c", "openssl rand -base64 756 > /data/mongodb-keyfile && chmod 400 /data/mongodb-keyfile && chown mongodb:mongodb /data/mongodb-keyfile && exec docker-entrypoint.sh mongod --replSet rs0 --keyFile /data/mongodb-keyfile --bind_ip_all" ]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    networks:
      - aitoearn-network
    healthcheck:
      test: [ "CMD-SHELL", "mongosh mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-password}@localhost:27017/admin?authSource=admin --quiet --eval \"db.adminCommand('ping').ok\" | grep 1 >/dev/null 2>&1" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  mongodb-rs-init:
    image: mongo:latest
    container_name: aitoearn-mongodb-rs-init
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint: [ "/bin/sh", "-c", "sleep 5 && mongosh mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-password}@mongodb:27017/?authSource=admin --eval \"try { rs.initiate({_id:'rs0', members:[{_id:0, host:'mongodb:27017'}]}) } catch(e) { if (e.codeName!=='AlreadyInitialized') throw e }\"" ]
    restart: "no"
    networks:
      - aitoearn-network

  redis:
    image: redis:latest
    container_name: aitoearn-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-password}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - aitoearn-network
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-password} ping | grep PONG >/dev/null 2>&1" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  rustfs:
    image: rustfs/rustfs:latest
    container_name: aitoearn-rustfs
    hostname: rustfs.local
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
    ports:
      - "9001:9001"
    volumes:
      - rustfs-data:/data
    networks:
      aitoearn-network:
        aliases:
          - rustfs.local
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  rustfs-init:
    image: minio/mc:latest
    container_name: aitoearn-rustfs-init
    depends_on:
      rustfs:
        condition: service_healthy
    networks:
      - aitoearn-network
    entrypoint: >
      /bin/sh -c " mc alias set rustfs http://rustfs.local:9000 ${RUSTFS_ACCESS_KEY:-rustfsadmin} ${RUSTFS_SECRET_KEY:-rustfsadmin}; mc mb rustfs/${RUSTFS_BUCKET:-aitoearn} --ignore-existing; mc anonymous set download rustfs/${RUSTFS_BUCKET:-aitoearn}; exit 0; "

  google-flow-playwright-worker:
    image: aitoearn/google-flow-playwright-worker:local
    build:
      context: ./project/aitoearn-backend/apps/google-flow-playwright-worker
      dockerfile: Dockerfile
    container_name: google-flow-playwright-worker
    restart: unless-stopped
    shm_size: "1gb"
    environment:
      PORT: ${GOOGLE_FLOW_WORKER_PORT:-4310}
      GOOGLE_FLOW_WORKER_API_KEY: ${GOOGLE_FLOW_WORKER_API_KEY:-}
      GOOGLE_FLOW_URL: ${GOOGLE_FLOW_URL:-https://labs.google/fx/tools/flow}
      GOOGLE_FLOW_USER_DATA_DIR: ${GOOGLE_FLOW_USER_DATA_DIR:-/data/google-flow-user-data}
      GOOGLE_FLOW_PROFILES_ROOT_DIR: ${GOOGLE_FLOW_PROFILES_ROOT_DIR:-/data/google-flow-user-data}
      GOOGLE_FLOW_DEBUG_EXPORT_DIR: ${GOOGLE_FLOW_DEBUG_EXPORT_DIR:-/project/debug-snapshots}
      GOOGLE_FLOW_HEADLESS: ${GOOGLE_FLOW_HEADLESS:-true}
      GOOGLE_FLOW_ACTION_TIMEOUT_MS: ${GOOGLE_FLOW_ACTION_TIMEOUT_MS:-120000}
      GOOGLE_FLOW_TASK_TTL_MS: ${GOOGLE_FLOW_TASK_TTL_MS:-86400000}
      GOOGLE_FLOW_STEALTH_USER_AGENT: ${GOOGLE_FLOW_STEALTH_USER_AGENT:-Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36}
      GOOGLE_FLOW_STEALTH_LOCALE: ${GOOGLE_FLOW_STEALTH_LOCALE:-en-US}
      GOOGLE_FLOW_STEALTH_TIMEZONE: ${GOOGLE_FLOW_STEALTH_TIMEZONE:-America/New_York}
      GOOGLE_FLOW_STEALTH_PLATFORM: ${GOOGLE_FLOW_STEALTH_PLATFORM:-Win32}
      GOOGLE_FLOW_STEALTH_VENDOR: ${GOOGLE_FLOW_STEALTH_VENDOR:-Google Inc.}
      GOOGLE_FLOW_STEALTH_ACCEPT_LANGUAGE: ${GOOGLE_FLOW_STEALTH_ACCEPT_LANGUAGE:-en-US,en;q=0.9}
      GOOGLE_FLOW_STEALTH_SEC_CH_UA: ${GOOGLE_FLOW_STEALTH_SEC_CH_UA:-"Not(A:Brand";v="99", "Google Chrome";v="123", "Chromium";v="123"}
      GOOGLE_FLOW_STEALTH_SEC_CH_UA_PLATFORM: ${GOOGLE_FLOW_STEALTH_SEC_CH_UA_PLATFORM:-"Windows"}
      GOOGLE_FLOW_STEALTH_SEC_CH_UA_MOBILE: ${GOOGLE_FLOW_STEALTH_SEC_CH_UA_MOBILE:-?0}
      GOOGLE_FLOW_STEALTH_DNT: ${GOOGLE_FLOW_STEALTH_DNT:-1}
      GOOGLE_FLOW_STEALTH_PLUGIN_ENABLED: ${GOOGLE_FLOW_STEALTH_PLUGIN_ENABLED:-true}
      GOOGLE_FLOW_BROWSER_CHANNEL: ${GOOGLE_FLOW_BROWSER_CHANNEL:-chrome}
      GOOGLE_FLOW_REMOTE_CDP_URL: ${GOOGLE_FLOW_REMOTE_CDP_URL:-http://google-flow-remote-browser:9223}
      GOOGLE_FLOW_REMOTE_LOGIN_OPEN_URL: ${GOOGLE_FLOW_REMOTE_LOGIN_OPEN_URL:-http://google-flow-remote-browser:4320/v1/login/open}
      GOOGLE_FLOW_REMOTE_LOGIN_PUBLIC_URL: ${GOOGLE_FLOW_REMOTE_LOGIN_PUBLIC_URL:-/flow-login/vnc.html?autoconnect=1&resize=scale}
    volumes:
      - google-flow-user-data:${GOOGLE_FLOW_USER_DATA_DIR:-/data/google-flow-user-data}
      - ./debug-snapshots:${GOOGLE_FLOW_DEBUG_EXPORT_DIR:-/project/debug-snapshots}
    depends_on:
      google-flow-remote-browser:
        condition: service_healthy
    networks:
      - aitoearn-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:${GOOGLE_FLOW_WORKER_PORT:-4310}/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  google-flow-remote-browser:
    image: aitoearn/google-flow-remote-browser:local
    build:
      context: ./project/aitoearn-backend/apps/google-flow-remote-browser
      dockerfile: Dockerfile
    container_name: google-flow-remote-browser
    restart: unless-stopped
    shm_size: "1gb"
    environment:
      PORT: ${GOOGLE_FLOW_REMOTE_BROWSER_PORT:-4320}
      GOOGLE_FLOW_URL: ${GOOGLE_FLOW_URL:-https://labs.google/fx/tools/flow}
      GOOGLE_FLOW_PROFILES_ROOT_DIR: ${GOOGLE_FLOW_USER_DATA_DIR:-/data/google-flow-user-data}
      GOOGLE_FLOW_REMOTE_LOGIN_PUBLIC_URL: ${GOOGLE_FLOW_REMOTE_LOGIN_PUBLIC_URL:-/flow-login/vnc.html?autoconnect=1&resize=scale}
      DISPLAY: ${GOOGLE_FLOW_REMOTE_DISPLAY:-:99}
      NOVNC_PORT: ${GOOGLE_FLOW_REMOTE_NOVNC_PORT:-6080}
      CDP_PORT: ${GOOGLE_FLOW_REMOTE_CDP_PORT:-9222}
      CDP_PROXY_PORT: ${GOOGLE_FLOW_REMOTE_CDP_PROXY_PORT:-9223}
      VNC_PORT: ${GOOGLE_FLOW_REMOTE_VNC_PORT:-5900}
    volumes:
      - google-flow-user-data:${GOOGLE_FLOW_USER_DATA_DIR:-/data/google-flow-user-data}
    networks:
      - aitoearn-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:${GOOGLE_FLOW_REMOTE_BROWSER_PORT:-4320}/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  aitoearn-init:
    image: node:lts-alpine
    container_name: aitoearn-init
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./scripts/init.mjs:/app/init.mjs:ro
      - ./scripts/init-package.json:/app/package.json:ro
      - init-data:/data/init
    working_dir: /app
    environment:
      MONGO_URI: ${INIT_MONGO_URI:-mongodb://admin:password@mongodb:27017}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret}
      DB_NAME: ${DB_NAME:-aitoearn}
      AUTO_LOGIN_TOKEN_PATH: ${AUTO_LOGIN_TOKEN_PATH:-/data/init/token.txt}
    entrypoint: /bin/sh -c "npm install --omit=dev 2>/dev/null && node init.mjs"
    networks:
      - aitoearn-network

  aitoearn-ai:
    image: aitoearn/aitoearn-ai:local
    build:
      context: ./project/aitoearn-backend
      dockerfile: apps/aitoearn-ai/Dockerfile
    container_name: aitoearn-ai
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      google-flow-playwright-worker:
        condition: service_healthy
    volumes:
      - ./project/aitoearn-backend/apps/aitoearn-ai/config/config.js:/app/config.js:ro
      - ./runtime/placeholder-gemini-key.json:/tmp/placeholder-gemini-key.json:ro
      - /mnt/social-drive:/mnt/social-drive:ro,rshared
      - /home/ubuntu/yt-tools:/home/ubuntu/yt-tools:ro
    networks:
      - aitoearn-network
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_ENV: ${APP_ENV:-production}
      APP_NAME: ${AI_APP_NAME:-aitoearn-ai}
      MONGO_URI: ${MONGO_URI:-}
      MONGODB_URI: ${MONGODB_URI:-}
      MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      MONGODB_PORT: ${MONGODB_PORT:-27017}
      MONGODB_USERNAME: ${MONGODB_USERNAME:-admin}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-password}
      REDIS_URL: ${REDIS_URL:-}
      REDIS_TLS: ${REDIS_TLS:-}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-change-this-secret-token}
      SERVER_URL: ${SERVER_URL:-http://aitoearn-server:3002}
      ASSETS_CONFIG: ${AI_ASSETS_CONFIG}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-placeholder}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      VOLCENGINE_API_KEY: ${VOLCENGINE_API_KEY:-}
      VOLCENGINE_ACCESS_KEY_ID: ${VOLCENGINE_ACCESS_KEY_ID:-}
      VOLCENGINE_SECRET_ACCESS_KEY: ${VOLCENGINE_SECRET_ACCESS_KEY:-}
      VOLCENGINE_VOD_SPACE_NAME: ${VOLCENGINE_VOD_SPACE_NAME:-}
      GROK_API_KEY: ${GROK_API_KEY:-}
      AICSO_API_KEY: ${AICSO_API_KEY:-}
      AICSO_BASE_URL: ${AICSO_BASE_URL:-}
      GEMINI_KEY_PAIRS: ${GEMINI_KEY_PAIRS}
      GEMINI_LOCATION: ${GEMINI_LOCATION:-us-central1}
      AI_PROXY_URL: ${AI_PROXY_URL:-}
      POLLINATIONS_IMAGE_BASE_URL: ${POLLINATIONS_IMAGE_BASE_URL:-https://gen.pollinations.ai/image}
      POLLINATIONS_VIDEO_BASE_URL: ${POLLINATIONS_VIDEO_BASE_URL:-https://gen.pollinations.ai/video}
      POLLINATIONS_APP_URL: ${POLLINATIONS_APP_URL:-https://api.piiblog.net}
      POLLINATIONS_SECRET_KEY: ${POLLINATIONS_SECRET_KEY:-}
      POLLINATIONS_PUBLISHABLE_KEY: ${POLLINATIONS_PUBLISHABLE_KEY:-}
      GOOGLE_FLOW_BROWSER_BASE_URL: ${GOOGLE_FLOW_BROWSER_BASE_URL:-http://google-flow-playwright-worker:4310}
      GOOGLE_FLOW_BROWSER_API_KEY: ${GOOGLE_FLOW_BROWSER_API_KEY:-}
      GOOGLE_FLOW_BROWSER_TIMEOUT_MS: ${GOOGLE_FLOW_BROWSER_TIMEOUT_MS:-60000}
      GOOGLE_FLOW_BROWSER_IMAGE_PATH: ${GOOGLE_FLOW_BROWSER_IMAGE_PATH:-/v1/image/generate}
      GOOGLE_FLOW_BROWSER_VIDEO_PATH: ${GOOGLE_FLOW_BROWSER_VIDEO_PATH:-/v1/video/generate}
      GOOGLE_FLOW_BROWSER_TASK_STATUS_PATH: ${GOOGLE_FLOW_BROWSER_TASK_STATUS_PATH:-/v1/tasks/{taskId}}
      GOOGLE_FLOW_BROWSER_LOGIN_URL_PATH: ${GOOGLE_FLOW_BROWSER_LOGIN_URL_PATH:-/v1/auth/login-url}
      GOOGLE_FLOW_BROWSER_SESSION_STATUS_PATH: ${GOOGLE_FLOW_BROWSER_SESSION_STATUS_PATH:-/v1/auth/session-status}
      GOOGLE_FLOW_BROWSER_RELOGIN_PATH: ${GOOGLE_FLOW_BROWSER_RELOGIN_PATH:-/v1/auth/relogin}
      GOOGLE_FLOW_BROWSER_LOGIN_OPEN_PATH: ${GOOGLE_FLOW_BROWSER_LOGIN_OPEN_PATH:-/v1/profiles/{profileId}/login/open}
      GOOGLE_FLOW_BROWSER_LOGIN_CREDENTIALS_PATH: ${GOOGLE_FLOW_BROWSER_LOGIN_CREDENTIALS_PATH:-/v1/profiles/{profileId}/login/credentials}
      PLAYWRIGHT_CREDENTIALS_SECRET: ${PLAYWRIGHT_CREDENTIALS_SECRET:-}

    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3010/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  aitoearn-server:
    image: aitoearn/aitoearn-server:local
    build:
      context: ./project/aitoearn-backend
      dockerfile: apps/aitoearn-server/Dockerfile
    container_name: aitoearn-server
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      aitoearn-ai:
        condition: service_healthy
    volumes:
      - ./project/aitoearn-backend/apps/aitoearn-server/config/config.js:/app/config.js:ro
    networks:
      - aitoearn-network
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_ENV: ${APP_ENV:-production}
      APP_NAME: ${SERVER_APP_NAME:-aitoearn-server}
      APP_DOMAIN: ${APP_DOMAIN:-api.piiblog.net}
      MONGODB_URI: ${MONGODB_URI:-${MONGO_URI:-}}
      MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      MONGODB_PORT: ${MONGODB_PORT:-27017}
      MONGODB_USERNAME: ${MONGODB_USERNAME:-admin}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-password}
      REDIS_URL: ${REDIS_URL:-}
      REDIS_TLS: ${REDIS_TLS:-}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
      AI_URL: ${AI_URL:-http://aitoearn-ai:3010}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret}
      ADMIN_PASSWORD_TOKEN: ${ADMIN_PASSWORD_TOKEN:-}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-change-this-secret-token}
      ASSETS_CONFIG: ${SERVER_ASSETS_CONFIG}
      MAIL_HOST: ${MAIL_HOST:-smtp.resend.com}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_SECURE: ${MAIL_SECURE:-true}
      MAIL_FROM: ${MAIL_FROM:-AiToEarn <noreply@yourdomain.com>}
      MAIL_USER: ${MAIL_USER:-resend}
      MAIL_PASS: ${MAIL_PASS:-}
      BILIBILI_CLIENT_ID: ${BILIBILI_CLIENT_ID:-}
      BILIBILI_CLIENT_SECRET: ${BILIBILI_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      KWAI_CLIENT_ID: ${KWAI_CLIENT_ID:-}
      KWAI_CLIENT_SECRET: ${KWAI_CLIENT_SECRET:-}
      PINTEREST_CLIENT_ID: ${PINTEREST_CLIENT_ID:-}
      PINTEREST_CLIENT_SECRET: ${PINTEREST_CLIENT_SECRET:-}
      TIKTOK_CLIENT_ID: ${TIKTOK_CLIENT_ID:-}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET:-}
      TWITTER_CLIENT_ID: ${TWITTER_CLIENT_ID:-}
      TWITTER_CLIENT_SECRET: ${TWITTER_CLIENT_SECRET:-}
      FACEBOOK_CLIENT_ID: ${FACEBOOK_CLIENT_ID:-}
      FACEBOOK_CLIENT_SECRET: ${FACEBOOK_CLIENT_SECRET:-}
      FACEBOOK_CONFIG_ID: ${FACEBOOK_CONFIG_ID:-}
      THREADS_CLIENT_ID: ${THREADS_CLIENT_ID:-}
      THREADS_CLIENT_SECRET: ${THREADS_CLIENT_SECRET:-}
      INSTAGRAM_CLIENT_ID: ${INSTAGRAM_CLIENT_ID:-}
      INSTAGRAM_CLIENT_SECRET: ${INSTAGRAM_CLIENT_SECRET:-}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID:--.apps.googleusercontent.com}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET:---}
      WXPLAT_APP_ID: ${WXPLAT_APP_ID:-}
      WXPLAT_APP_SECRET: ${WXPLAT_APP_SECRET:-}
      WXPLAT_ENCODING_AES_KEY: ${WXPLAT_ENCODING_AES_KEY:-}
      DOYIN_CLIENT_ID: ${DOYIN_CLIENT_ID:-}
      DOYIN_CLIENT_SECRET: ${DOYIN_CLIENT_SECRET:-}
      ALI_SMS_ACCESS_KEY_ID: ${ALI_SMS_ACCESS_KEY_ID:-}
      ALI_SMS_ACCESS_KEY_SECRET: ${ALI_SMS_ACCESS_KEY_SECRET:-}
      ALI_SMS_SIGN_NAME: ${ALI_SMS_SIGN_NAME:-}
      ALI_SMS_TEMPLATE_CODE: ${ALI_SMS_TEMPLATE_CODE:-}
      RELAY_SERVER_URL: ${RELAY_SERVER_URL:-https://${PUBLISHER_DOMAIN:-aitoearn.ai}/api}
      RELAY_API_KEY: ${RELAY_API_KEY:-}
      RELAY_CALLBACK_URL: ${RELAY_CALLBACK_URL:-https://${APP_DOMAIN:-api.piiblog.net}/api/plat/relay-callback}

    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  aitoearn-web:
    image: aitoearn/aitoearn-web:local
    build:
      context: ./project/aitoearn-web
      dockerfile: Dockerfile
    container_name: aitoearn-web
    restart: unless-stopped
    depends_on:
      aitoearn-server:
        condition: service_healthy
    volumes:
      - init-data:/data/init:ro
    networks:
      - aitoearn-network
    command: [ "/bin/sh", "-c", "AUTO_LOGIN_TOKEN=$$(cat /data/init/token.txt 2>/dev/null || echo '') exec node server.js" ]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_TELEMETRY_DISABLED: ${NEXT_TELEMETRY_DISABLED:-1}
      NEXT_PUBLIC_APP_DOMAIN: ${APP_DOMAIN:-api.piiblog.net}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://${APP_DOMAIN:-api.piiblog.net}}
      NEXT_PUBLIC_DOCS_URL: ${NEXT_PUBLIC_DOCS_URL:-https://docs.aitoearn.ai}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}

  dozzle:
    image: amir20/dozzle:latest
    container_name: aitoearn-dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_BASE: /system-logs-proxy
    networks:
      - aitoearn-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: aitoearn-nginx
    restart: unless-stopped
    depends_on:
      aitoearn-web:
        condition: service_started
      aitoearn-server:
        condition: service_healthy
      aitoearn-ai:
        condition: service_healthy
    ports:
      - "8080:80"
      - "9000:9000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - aitoearn-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/_nhealth" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  aitoearn-network:
    driver: bridge
    name: aitoearn-network

volumes:
  mongodb-data:
    driver: local
  mongodb-config:
    driver: local
  redis-data:
    driver: local
  rustfs-data:
    driver: local
  init-data:
    driver: local
  google-flow-user-data:
    driver: local
